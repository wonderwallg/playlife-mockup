<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLFIN - UI Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#080808;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo-img{height:48px;margin-bottom:16px}
.sub{color:#666;font-size:14px;margin-bottom:48px}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:32px;width:320px;transition:all .2s;cursor:pointer;text-decoration:none;color:#f0f0f0}
.card:hover{border-color:#2DB87A;transform:translateY(-4px);box-shadow:0 12px 40px rgba(45,184,122,.15)}
.card-icon{font-size:40px;margin-bottom:16px}
.card h2{font-size:18px;font-weight:600;margin-bottom:8px}
.card p{color:#888;font-size:13px;line-height:1.5}
.badge{display:inline-block;background:#1a3d2e;color:#2DB87A;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;margin-top:12px}
</style>
</head>
<body>
<img src="logo.png" alt="GOLFIN" class="logo-img">
<p class="sub">UI Mockups</p>
<div class="cards">
  <a href="PLAYLIFE-UI-v2.html" class="card">
    <div class="card-icon">📱</div>
    <h2>Main UI</h2>
    <p>Home / Vote / Gift / Profile の4画面モックアップ</p>
    <span class="badge">4 SCREENS</span>
  </a>
  <a href="PLAYLIFE-avatar-badges.html" class="card">
    <div class="card-icon">🎮</div>
    <h2>Avatar & Badges</h2>
    <p>アバター成長システム + バッジコレクション</p>
    <span class="badge">2 SCREENS</span>
  </a>
</div>
</body>
</html>
